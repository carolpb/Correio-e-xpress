<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acesso Restrito – Correio e-xpress</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f2f2f2;
    }

    header {
        padding: 15px 25px;
        border-bottom: 1px solid #ccc;
        background: #fff;
        display: flex;
        align-items: center;
        gap: 15px;
    }

    header img {
        height: 55px;
    }

    header strong {
        font-size: 18px;
    }

    .login-box {
        max-width: 400px;
        margin: 80px auto;
        background: #fff;
        padding: 25px;
        border-radius: 6px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        font-family: serif;
    }

    .login-box p {
        margin-top: 0;
        font-size: 18px;
        font-weight: bold;
    }

    .login-box input {
        width: 100%;
        padding: 8px;
        margin-bottom: 12px;
        font-size: 14px;
    }

    .login-box button {
        width: 100%;
        padding: 10px;
        background: #2d6cdf;
        color: #fff;
        border: none;
        cursor: pointer;
        font-size: 15px;
    }

    .login-box button:hover {
        background: #1f55b6;
    }

    #erro {
        color: red;
        margin-top: 12px;
        font-size: 14px;
    }
</style>
</head>

<body>

<header>
    <img src="imagens/logo.png" alt="Mosteiro de São Bento do Monte">
    <strong>Correio E-xpress</strong>
</header>

<div class="login-box">
    <p>Acesso Restrito</p>

    <input type="email" id="email" placeholder="nome@msbm.org">
    <input type="password" id="senha" placeholder="Senha">

    <button onclick="login()">Aceder</button>

    <p id="erro"></p>
</div>

<script>
function login() {
    const email = document.getElementById("email").value;
    const senha = document.getElementById("senha").value;

    if (email === "m.amarante@msbm.org" && senha === "123456") {
        window.location.href = "amarantecaixa.html";
    } else {
        document.getElementById("erro").innerText = "Credenciais inválidas.";
    }
}
</script>

</body>
</html>
